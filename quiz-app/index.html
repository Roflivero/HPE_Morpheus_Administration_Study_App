<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPE Morpheus Exam Prep</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="bar"></span>
      <h1>HPE Morpheus Exam Prep</h1>
    </div>
    <div class="header-right">
      <span id="score-display">Score: 0 / 0</span>
      <button id="restart-btn" class="ghost">Reset</button>
    </div>
  </header>

  <main>
    <section id="setup" class="card">
      <h2>Select Practice Mode</h2>
      <div class="form-row">
        <label>Modules</label>
        <div id="module-checkboxes" class="checkbox-group"></div>
        <div class="quick-actions">
          <button class="link" id="select-all">Select all</button>
          <button class="link" id="select-none">Clear all</button>
        </div>
      </div>

      <div class="form-row">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="all">All</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="form-row">
        <label for="num-questions">Number of questions</label>
        <select id="num-questions">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="40">40</option>
          <option value="60">60</option>
          <option value="0">All</option>
        </select>
      </div>

      <div class="form-row">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="practice">Practice (show answers immediately)</option>
          <option value="exam">Exam (show answers at the end)</option>
        </select>
      </div>

      <div class="form-row">
        <label>Question types</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="mc" checked /> Multiple choice</label>
          <label><input type="checkbox" value="tf" checked /> True / False</label>
          <label><input type="checkbox" value="multi" checked /> Multiple answers</label>
        </div>
      </div>

      <button id="start-btn" class="primary">Start practice</button>
      <p class="meta">Total questions in bank: <span id="total-questions"></span></p>
    </section>

    <section id="quiz" class="card hidden">
      <div class="progress">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text">Question 1 of 20</p>
      </div>
      <div id="question-container"></div>
      <div class="quiz-controls">
        <button id="check-btn" class="primary">Check answer</button>
        <button id="next-btn" class="primary hidden">Next</button>
        <button id="finish-early-btn" class="ghost">Finish early</button>
      </div>
      <div id="explanation" class="explanation hidden"></div>
    </section>

    <section id="result" class="card hidden">
      <h2>Results</h2>
      <div class="result-summary">
        <div class="result-stat">
          <span class="big" id="result-score"></span>
          <span class="small">Correct</span>
        </div>
        <div class="result-stat">
          <span class="big" id="result-percent"></span>
          <span class="small">Percent</span>
        </div>
        <div class="result-stat">
          <span class="big" id="result-total"></span>
          <span class="small">Count</span>
        </div>
      </div>
      <p id="result-message"></p>
      <h3>Review</h3>
      <div id="review-container"></div>
      <div class="result-actions">
        <button id="try-again-btn" class="primary">Try again</button>
        <button id="new-config-btn" class="ghost">New configuration</button>
      </div>
    </section>
  </main>

  <footer>
    <p>Practice tool for HPE Morpheus Enterprise Software Administration (H45ZD)</p>
  </footer>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
